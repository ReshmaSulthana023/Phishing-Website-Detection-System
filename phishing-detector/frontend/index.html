<html lang="en">
<head>

<script>
  tailwind.config = {

      extend: {
        colors: {
          cyber: {
            bg: '#0b0f1a',
            panel: '#111827',
            border: '#1f2937',
            accent: '#22d3ee',
            green: '#22c55e',
            red: '#ef4444',
            amber: '#f59e0b',
          }
        },
        fontFamily: {

</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', sans-serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .glow { box-shadow: 0 0 30px -10px rgba(34, 211, 238, 0.5); }
  .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
  ::selection { background: rgba(34,211,238,0.3); }
  @keyframes pulse-glow {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

</style>
</head>
<body class="bg-slate-100 dark:bg-cyber-bg text-slate-800 dark:text-slate-200 transition-colors duration-300">
<div id="root"></div>

<script type="text/babel" data-presets="react,env">
const { useState, useEffect, useRef, useMemo } = React;

const API_BASE = "http://localhost:5000/api";

// ---------------------------------------------------------------------------
// Helper components
// ---------------------------------------------------------------------------

function RiskBadge({ level }) {
  const styles = {
    Low: "bg-emerald-500/15 text-emerald-400 border-emerald-500/30",
    Medium: "bg-amber-500/15 text-amber-400 border-amber-500/30",
    High: "bg-red-500/15 text-red-400 border-red-500/30",
  };
  return (
    <span className={`inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold border ${styles[level] || styles.Low}`}>
      <span className="w-1.5 h-1.5 rounded-full bg-current"></span>
      {level} Risk
    </span>
  );
}

function PredictionBadge({ prediction }) {
  const isPhishing = prediction === "Phishing Website";
  return (
    <span className={`inline-flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-bold border
      ${isPhishing
        ? "bg-red-500/10 text-red-400 border-red-500/40"
        : "bg-emerald-500/10 text-emerald-400 border-emerald-500/40"}`}>
      {isPhishing ? "⚠ Phishing Website" : "✓ Safe Website"}
    </span>
  );
}

function SafetyGauge({ score }) {
  const color = score >= 70 ? "#22c55e" : score >= 40 ? "#f59e0b" : "#ef4444";
  const circumference = 2 * Math.PI * 54;
  const offset = circumference - (score / 100) * circumference;
  return (
    <div className="relative w-36 h-36 flex items-center justify-center">
      <svg className="transform -rotate-90 w-36 h-36">
        <circle cx="72" cy="72" r="54" stroke="currentColor" strokeWidth="10" fill="none" className="text-slate-200 dark:text-slate-800" />
        <circle cx="72" cy="72" r="54" stroke={color} strokeWidth="10" fill="none"
          strokeDasharray={circumference} strokeDashoffset={offset} strokeLinecap="round"
          style={{ transition: "stroke-dashoffset 1s ease" }} />
      </svg>
      <div className="absolute flex flex-col items-center">
        <span className="text-3xl font-extrabold mono" style={{ color }}>{score}</span>
        <span className="text-xs text-slate-400">/ 100</span>
      </div>
    </div>
  );
}

function FeatureChip({ label, value }) {
  return (
    <div className="flex justify-between items-center px-3 py-2 rounded-lg bg-slate-100 dark:bg-slate-800/60 border border-slate-200 dark:border-slate-700/50">
      <span className="text-xs text-slate-500 dark:text-slate-400">{label}</span>
      <span className="text-sm font-semibold mono">{String(value)}</span>
    </div>
  );
}

const FEATURE_LABELS = {
  url_length: "URL Length",
  domain_length: "Domain Length",
  num_dots: "Dots",
  num_hyphens: "Hyphens",
  num_subdomains: "Subdomains",
  has_at_symbol: "@ Symbol",
  has_https: "HTTPS",
  has_ip: "IP Address",
  num_digits: "Digits",
  suspicious_keyword_count: "Suspicious Keywords",
  url_depth: "Path Depth",
  has_double_slash_redirect: "// Redirect",
  brand_impersonation: "Brand Impersonation",
};

// ---------------------------------------------------------------------------
// Navbar
// ---------------------------------------------------------------------------

function Navbar({ page, setPage, dark, setDark }) {
  const links = [
    { id: "home", label: "Scanner", icon: "🛡️" },
    { id: "history", label: "History", icon: "🕘" },
    { id: "dashboard", label: "Dashboard", icon: "📊" },
    { id: "extension", label: "Extension", icon: "🧩" },
  ];
  return (
    <nav className="sticky top-0 z-50 backdrop-blur-md bg-white/70 dark:bg-cyber-bg/80 border-b border-slate-200 dark:border-cyber-border">
      <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
        <div className="flex items-center gap-2">
          <div className="w-9 h-9 rounded-lg bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center text-lg font-bold text-white glow">
            🛡️
          </div>
          <div>
            <h1 className="font-extrabold text-lg leading-tight tracking-tight">ShieldScan</h1>
            <p className="text-[10px] text-slate-400 leading-none mono">AI Phishing Detection</p>
          </div>
        </div>
        <div className="hidden md:flex items-center gap-1 bg-slate-100 dark:bg-slate-800/60 rounded-xl p-1">
          {links.map(l => (
            <button key={l.id} onClick={() => setPage(l.id)}
              className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-colors flex items-center gap-1.5
                ${page === l.id
                  ? "bg-white dark:bg-cyber-panel text-cyan-600 dark:text-cyan-400 shadow"
                  : "text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200"}`}>
              <span>{l.icon}</span>{l.label}
            </button>
          ))}
        </div>
        <div className="flex items-center gap-2">
          <button onClick={() => setDark(!dark)}
            className="w-9 h-9 rounded-lg flex items-center justify-center bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:scale-105 transition-transform">
            {dark ? "☀️" : "🌙"}
          </button>
        </div>
      </div>
      <div className="md:hidden flex justify-around border-t border-slate-200 dark:border-cyber-border px-2 py-1">
        {links.map(l => (
          <button key={l.id} onClick={() => setPage(l.id)}
            className={`flex-1 py-1.5 rounded-lg text-xs font-medium flex flex-col items-center gap-0.5
              ${page === l.id ? "text-cyan-500" : "text-slate-400"}`}>
            <span>{l.icon}</span>{l.label}
          </button>
        ))}
      </div>
    </nav>
  );
}

// ---------------------------------------------------------------------------
// Result Card
// ---------------------------------------------------------------------------

function ResultCard({ result }) {
  if (!result) return null;
  if (result.error) {
    return (
      <div className="mt-6 p-4 rounded-xl bg-red-500/10 border border-red-500/30 text-red-400 text-sm">
        ⚠ {result.error}
      </div>
    );
  }

  const downloadPDF = () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    let y = 20;
    doc.setFontSize(18);
    doc.text("ShieldScan — URL Safety Report", 14, y);
    y += 10;
    doc.setFontSize(10);
    doc.setTextColor(100);
    doc.text(`Generated: ${new Date(result.checked_at).toLocaleString()}`, 14, y);
    y += 10;
    doc.setDrawColor(200);
    doc.line(14, y, 196, y);
    y += 8;

    doc.setFontSize(12);
    doc.setTextColor(0);
    doc.text("URL:", 14, y);
    doc.setFont(undefined, "bold");
    doc.text(result.url, 30, y);
    doc.setFont(undefined, "normal");
    y += 8;

    doc.text("Prediction:", 14, y);
    doc.setTextColor(result.is_phishing ? 200 : 30, result.is_phishing ? 30 : 140, 30);
    doc.text(result.prediction, 45, y);
    doc.setTextColor(0);
    y += 8;

    doc.text(`Confidence: ${result.confidence}%`, 14, y); y += 8;
    doc.text(`Safety Score: ${result.safety_score} / 100`, 14, y); y += 8;
    doc.text(`Risk Level: ${result.risk_level}`, 14, y); y += 10;

    doc.setFont(undefined, "bold");
    doc.text("Risk Factors:", 14, y);
    doc.setFont(undefined, "normal");
    y += 8;
    result.reasons.forEach(r => {
      const lines = doc.splitTextToSize(`• ${r}`, 175);
      doc.text(lines, 18, y);
      y += 6 * lines.length;
    });

    y += 6;
    doc.setFont(undefined, "bold");
    doc.text("Extracted URL Features:", 14, y);
    doc.setFont(undefined, "normal");
    y += 8;
    Object.entries(result.features).forEach(([k, v]) => {
      doc.text(`${FEATURE_LABELS[k] || k}: ${v}`, 18, y);
      y += 6;
      if (y > 280) { doc.addPage(); y = 20; }
    });

    doc.save(`shieldscan-report-${Date.now()}.pdf`);
  };

  return (
    <div className="mt-8 rounded-2xl border border-slate-200 dark:border-cyber-border bg-white dark:bg-cyber-panel overflow-hidden">
      <div className="p-5 border-b border-slate-100 dark:border-cyber-border flex flex-wrap items-center justify-between gap-3">
        <div>
          <p className="text-xs text-slate-400 mono mb-1 break-all">{result.url}</p>
          <div className="flex items-center gap-2 flex-wrap">
            <PredictionBadge prediction={result.prediction} />
            <RiskBadge level={result.risk_level} />
          </div>
        </div>
        <button onClick={downloadPDF}
          className="px-3 py-2 rounded-lg text-sm font-medium bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 border border-slate-200 dark:border-slate-700 flex items-center gap-2 transition-colors">
          📄 Download PDF Report
        </button>
      </div>

      <div className="p-5 grid md:grid-cols-3 gap-6">
        <div className="flex flex-col items-center justify-center gap-3 md:border-r border-slate-100 dark:border-cyber-border md:pr-6">
          <SafetyGauge score={result.safety_score} />
          <p className="text-sm text-slate-500 dark:text-slate-400">Safety Score</p>
          <div className="text-center">
            <p className="text-2xl font-extrabold mono">{result.confidence}%</p>
            <p className="text-xs text-slate-400">Model Confidence</p>
          </div>
        </div>

        <div className="md:col-span-2">
          <h3 className="font-bold mb-3 flex items-center gap-2">
            🔍 Risk Factor Analysis
          </h3>
          <ul className="space-y-2 mb-5">
            {result.reasons.map((r, i) => (
              <li key={i} className={`flex items-start gap-2 text-sm p-2.5 rounded-lg
                ${result.is_phishing ? "bg-red-500/5 text-red-300 dark:text-red-300" : "bg-emerald-500/5 text-emerald-700 dark:text-emerald-300"}`}>
                <span className="mt-0.5">{result.is_phishing ? "✗" : "✓"}</span>
                <span>{r}</span>
              </li>
            ))}
          </ul>

          <h4 className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Extracted URL Features</h4>
          <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
            {Object.entries(result.features).map(([k, v]) => (
              <FeatureChip key={k} label={FEATURE_LABELS[k] || k} value={v} />
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ---------------------------------------------------------------------------
// Home / Scanner Page
// ---------------------------------------------------------------------------

function HomePage({ onScanned }) {
  const [url, setUrl] = useState("");
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);

  const examples = [
    "https://www.google.com",
    "https://amazon-login-secure.info",
    "http://192.168.10.5/wp-login.php",
    "https://paypal.com.account-verify.xyz/signin",
  ];

  const handleCheck = async (checkUrl) => {
    const target = (checkUrl || url).trim();
    if (!target) return;
    setLoading(true);
    setResult(null);
    try {
      const res = await fetch(`${API_BASE}/check`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: target }),
      });
      const data = await res.json();
      setResult(data);
      if (!data.error) onScanned && onScanned();
    } catch (e) {
      setResult({ error: "Could not reach the backend API. Make sure the Flask server is running on port 5000." });
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="max-w-4xl mx-auto px-4 py-10">
      <div className="text-center mb-8">
        <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-cyan-500/10 border border-cyan-500/30 text-cyan-500 text-xs font-semibold mb-4">
          <span className="w-2 h-2 rounded-full bg-cyan-400 pulse-dot"></span>
          AI Model Online · Random Forest Classifier
        </div>
        <h1 className="text-4xl sm:text-5xl font-extrabold tracking-tight mb-3">
          Is this website <span className="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">safe</span> or <span className="text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-400">phishing</span>?
        </h1>
        <p className="text-slate-500 dark:text-slate-400 max-w-xl mx-auto">
          Paste any URL below. Our machine learning model analyzes its structure in real time and explains exactly why it's flagged.
        </p>
      </div>

      <div className="rounded-2xl border border-slate-200 dark:border-cyber-border bg-white dark:bg-cyber-panel p-3 flex flex-col sm:flex-row gap-2 glow">
        <div className="flex items-center gap-2 flex-1 px-3">
          <span className="text-slate-400">🔗</span>
          <input
            value={url}
            onChange={(e) => setUrl(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && handleCheck()}
            placeholder="https://example.com/login"
            className="w-full bg-transparent py-3 outline-none mono text-sm placeholder:text-slate-400"
          />
        </div>
        <button onClick={() => handleCheck()} disabled={loading}
          className="px-6 py-3 rounded-xl font-bold text-white bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 transition-all disabled:opacity-60 flex items-center justify-center gap-2 shrink-0">
          {loading ? (
            <>
              <span className="w-4 h-4 border-2 border-white/40 border-t-white rounded-full animate-spin"></span>
              Analyzing...
            </>
          ) : "Check URL"}
        </button>
      </div>

      <div className="flex flex-wrap gap-2 mt-3">
        <span className="text-xs text-slate-400 mt-1.5">Try:</span>
        {examples.map((ex, i) => (
          <button key={i} onClick={() => { setUrl(ex); handleCheck(ex); }}
            className="text-xs px-2.5 py-1.5 rounded-lg bg-slate-100 dark:bg-slate-800/70 hover:bg-slate-200 dark:hover:bg-slate-700 mono text-slate-500 dark:text-slate-400 transition-colors">
            {ex}
          </button>
        ))}
      </div>

      <ResultCard result={result} />

      <div className="grid sm:grid-cols-3 gap-4 mt-12">
        {[
          { icon: "🧠", title: "ML-Powered", desc: "Random Forest classifier trained on 13 URL-derived features." },
          { icon: "🔎", title: "Explainable AI", desc: "Every prediction comes with clear, human-readable risk factors." },
          { icon: "⚡", title: "Real-Time", desc: "Instant analysis with confidence scores and a 0–100 safety rating." },
        ].map((f, i) => (
          <div key={i} className="p-4 rounded-xl border border-slate-200 dark:border-cyber-border bg-white dark:bg-cyber-panel">
            <div className="text-2xl mb-2">{f.icon}</div>
            <h3 className="font-bold mb-1">{f.title}</h3>
            <p className="text-sm text-slate-500 dark:text-slate-400">{f.desc}</p>
          </div>
        ))}
      </div>
    </div>
  );
}

// ---------------------------------------------------------------------------
// History Page
// ---------------------------------------------------------------------------

function HistoryPage() {
  const [history, setHistory] = useState([]);
  const [search, setSearch] = useState("");
  const [riskFilter, setRiskFilter] = useState("");
  const [predFilter, setPredFilter] = useState("");
  const [loading, setLoading] = useState(true);
  const [expanded, setExpanded] = useState(null);

  const fetchHistory = async () => {
    setLoading(true);
    const params = new URLSearchParams();
    if (search) params.set("search", search);
    if (riskFilter) params.set("risk", riskFilter);
    if (predFilter) params.set("prediction", predFilter);
    try {
      const res = await fetch(`${API_BASE}/history?${params.toString()}`);
      const data = await res.json();
      setHistory(data.history || []);
    } catch (e) {
      setHistory([]);
    } finally {
      setLoading(false);
    }
  };

  useEffect(() => {
    const t = setTimeout(fetchHistory, 250);
    return () => clearTimeout(t);
  }, [search, riskFilter, predFilter]);

  const handleDelete = async (id) => {
    await fetch(`${API_BASE}/history/${id}`, { method: "DELETE" });
    fetchHistory();
  };

  const handleClearAll = async () => {
    if (!confirm("Clear all scan history?")) return;
    await fetch(`${API_BASE}/history`, { method: "DELETE" });
    fetchHistory();
  };

  return (
    <div className="max-w-5xl mx-auto px-4 py-10">
      <div className="flex flex-wrap items-center justify-between gap-3 mb-6">
        <div>
          <h2 className="text-2xl font-extrabold">Scan History</h2>
          <p className="text-sm text-slate-400">Search and filter previously checked URLs.</p>
        </div>
        <button onClick={handleClearAll}
          className="text-sm px-3 py-2 rounded-lg border border-red-500/30 text-red-400 hover:bg-red-500/10 transition-colors">
          🗑 Clear All
        </button>
      </div>

      <div className="flex flex-col sm:flex-row gap-3 mb-5">
        <input value={search} onChange={(e) => setSearch(e.target.value)}
          placeholder="Search by URL..."
          className="flex-1 px-4 py-2.5 rounded-xl border border-slate-200 dark:border-cyber-border bg-white dark:bg-cyber-panel outline-none focus:ring-2 ring-cyan-500/40 text-sm mono" />
        <select value={predFilter} onChange={(e) => setPredFilter(e.target.value)}
          className="px-4 py-2.5 rounded-xl border border-slate-200 dark:border-cyber-border bg-white dark:bg-cyber-panel text-sm">
          <option value="">All Results</option>
          <option value="safe">Safe Only</option>
          <option value="phishing">Phishing Only</option>
        </select>
        <select value={riskFilter} onChange={(e) => setRiskFilter(e.target.value)}
          className="px-4 py-2.5 rounded-xl border border-slate-200 dark:border-cyber-border bg-white dark:bg-cyber-panel text-sm">
          <option value="">All Risk Levels</option>
          <option value="Low">Low Risk</option>
          <option value="Medium">Medium Risk</option>
          <option value="High">High Risk</option>
        </select>
      </div>

      {loading ? (
        <p className="text-center text-slate-400 py-10">Loading...</p>
      ) : history.length === 0 ? (
        <div className="text-center py-16 text-slate-400">
          <p className="text-4xl mb-2">📭</p>
          <p>No scan history found.</p>
        </div>
      ) : (
        <div className="space-y-2">
          {history.map((item) => (
            <div key={item.id} className="rounded-xl border border-slate-200 dark:border-cyber-border bg-white dark:bg-cyber-panel overflow-hidden">
              <button onClick={() => setExpanded(expanded === item.id ? null : item.id)}
                className="w-full flex items-center justify-between gap-3 p-3.5 text-left hover:bg-slate-50 dark:hover:bg-slate-800/40 transition-colors">
                <div className="min-w-0 flex-1">
                  <p className="text-sm font-medium mono truncate">{item.url}</p>
                  <p className="text-xs text-slate-400">{new Date(item.checked_at).toLocaleString()}</p>
                </div>
                <div className="flex items-center gap-2 shrink-0">
                  <RiskBadge level={item.risk_level} />
                  <PredictionBadge prediction={item.prediction} />
                  <button onClick={(e) => { e.stopPropagation(); handleDelete(item.id); }}
                    className="text-slate-400 hover:text-red-400 px-2">✕</button>
                </div>
              </button>
              {expanded === item.id && (
                <div className="px-4 pb-4 border-t border-slate-100 dark:border-cyber-border pt-3">
                  <div className="grid sm:grid-cols-2 gap-4">
                    <div>
                      <p className="text-xs font-bold uppercase text-slate-400 mb-2">Risk Factors</p>
                      <ul className="space-y-1 text-sm">
                        {item.reasons.map((r, i) => (
                          <li key={i} className="flex gap-2">
                            <span>{item.prediction === "Phishing Website" ? "✗" : "✓"}</span>{r}
                          </li>
                        ))}
                      </ul>
                    </div>
                    <div className="flex items-center gap-6">
                      <div>
                        <p className="text-xs text-slate-400">Confidence</p>
                        <p className="text-xl font-bold mono">{item.confidence}%</p>
                      </div>
                      <div>
                        <p className="text-xs text-slate-400">Safety Score</p>
                        <p className="text-xl font-bold mono">{item.safety_score}/100</p>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ---------------------------------------------------------------------------
// Dashboard Page
// ---------------------------------------------------------------------------

function StatCard({ icon, label, value, accent }) {
  return (
    <div className="p-5 rounded-2xl border border-slate-200 dark:border-cyber-border bg-white dark:bg-cyber-panel">
      <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-lg mb-3 ${accent}`}>{icon}</div>
      <p className="text-2xl font-extrabold mono">{value}</p>
      <p className="text-sm text-slate-400">{label}</p>
    </div>
  );
}

function DashboardPage({ refreshKey }) {
  const [stats, setStats] = useState(null);
  const pieRef = useRef(null);
  const trendRef = useRef(null);
  const pieChart = useRef(null);
  const trendChart = useRef(null);

  const fetchStats = async () => {
    try {
      const res = await fetch(`${API_BASE}/dashboard`);
      setStats(await res.json());
    } catch (e) {
      setStats(null);
    }
  };

  useEffect(() => { fetchStats(); }, [refreshKey]);

  useEffect(() => {
    if (!stats) return;

    if (pieChart.current) pieChart.current.destroy();
    pieChart.current = new Chart(pieRef.current, {
      type: "doughnut",
      data: {
        labels: ["Safe", "Phishing"],
        datasets: [{
          data: [stats.safe_count, stats.phishing_count],
          backgroundColor: ["#22c55e", "#ef4444"],
          borderWidth: 0,
        }]
      },
      options: {
        plugins: { legend: { position: "bottom", labels: { color: "#94a3b8" } } },
        cutout: "65%",
      }
    });

    if (trendChart.current) trendChart.current.destroy();
    const labels = stats.trend.map(t => t.date);
    trendChart.current = new Chart(trendRef.current, {
      type: "line",
      data: {
        labels,
        datasets: [
          { label: "Safe", data: stats.trend.map(t => t.safe), borderColor: "#22c55e", backgroundColor: "rgba(34,197,94,0.1)", tension: 0.35, fill: true },
          { label: "Phishing", data: stats.trend.map(t => t.phishing), borderColor: "#ef4444", backgroundColor: "rgba(239,68,68,0.1)", tension: 0.35, fill: true },
        ]
      },
      options: {
        plugins: { legend: { position: "bottom", labels: { color: "#94a3b8" } } },
        scales: {
          x: { ticks: { color: "#94a3b8" }, grid: { color: "rgba(148,163,184,0.1)" } },
          y: { ticks: { color: "#94a3b8" }, grid: { color: "rgba(148,163,184,0.1)" }, beginAtZero: true }
        }
      }
    });
  }, [stats]);

  if (!stats) return <div className="text-center py-20 text-slate-400">Loading dashboard...</div>;

  return (
    <div className="max-w-6xl mx-auto px-4 py-10">
      <h2 className="text-2xl font-extrabold mb-1">Dashboard</h2>
      <p className="text-sm text-slate-400 mb-6">Overview of phishing detection activity and model performance.</p>

      <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        <StatCard icon="🌐" label="Total URLs Analyzed" value={stats.total_checked} accent="bg-cyan-500/10 text-cyan-400" />
        <StatCard icon="✅" label="Safe URLs" value={stats.safe_count} accent="bg-emerald-500/10 text-emerald-400" />
        <StatCard icon="🚨" label="Phishing URLs" value={stats.phishing_count} accent="bg-red-500/10 text-red-400" />
        <StatCard icon="🎯" label="Model Accuracy" value={`${stats.model_accuracy}%`} accent="bg-violet-500/10 text-violet-400" />
      </div>

      <div className="grid lg:grid-cols-3 gap-4 mb-8">
        <div className="lg:col-span-1 p-5 rounded-2xl border border-slate-200 dark:border-cyber-border bg-white dark:bg-cyber-panel">
          <h3 className="font-bold mb-3">Safe vs Phishing</h3>
          <div className="h-56"><canvas ref={pieRef}></canvas></div>
          <div className="mt-4 space-y-2">
            {Object.entries(stats.risk_distribution).map(([k, v]) => (
              <div key={k} className="flex items-center justify-between text-sm">
                <RiskBadge level={k} />
                <span className="mono font-semibold">{v}</span>
              </div>
            ))}
          </div>
        </div>
        <div className="lg:col-span-2 p-5 rounded-2xl border border-slate-200 dark:border-cyber-border bg-white dark:bg-cyber-panel">
          <h3 className="font-bold mb-3">Detection Trend</h3>
          <div className="h-56"><canvas ref={trendRef}></canvas></div>
        </div>
      </div>

      <div className="p-5 rounded-2xl border border-slate-200 dark:border-cyber-border bg-white dark:bg-cyber-panel">
        <h3 className="font-bold mb-3">Recent Checks</h3>
        {stats.recent_checks.length === 0 ? (
          <p className="text-sm text-slate-400">No checks yet — scan a URL to get started.</p>
        ) : (
          <div className="space-y-2">
            {stats.recent_checks.map(item => (
              <div key={item.id} className="flex items-center justify-between gap-3 p-3 rounded-lg bg-slate-50 dark:bg-slate-800/40">
                <p className="text-sm mono truncate flex-1">{item.url}</p>
                <RiskBadge level={item.risk_level} />
                <PredictionBadge prediction={item.prediction} />
                <span className="text-sm font-bold mono w-16 text-right">{item.safety_score}/100</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ---------------------------------------------------------------------------
// Browser Extension Simulation Page
// ---------------------------------------------------------------------------

function ExtensionPage() {
  const [url, setUrl] = useState("https://amazon-login-secure.info/account/verify");
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);

  const handleScan = async () => {
    setLoading(true);
    try {
      const res = await fetch(`${API_BASE}/check`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url }),
      });
      setResult(await res.json());
    } catch (e) {
      setResult({ error: "Backend unreachable." });
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="max-w-4xl mx-auto px-4 py-10">
      <h2 className="text-2xl font-extrabold mb-1">Browser Extension Simulation</h2>
      <p className="text-sm text-slate-400 mb-6">Preview how ShieldScan would appear as a browser toolbar popup while visiting a site.</p>

      <div className="grid lg:grid-cols-2 gap-6">
        <div>
          <div className="rounded-xl border border-slate-200 dark:border-cyber-border bg-white dark:bg-cyber-panel overflow-hidden">
            <div className="bg-slate-100 dark:bg-slate-800 px-3 py-2 flex items-center gap-2">
              <div className="flex gap-1.5">
                <span className="w-3 h-3 rounded-full bg-red-400"></span>
                <span className="w-3 h-3 rounded-full bg-amber-400"></span>
                <span className="w-3 h-3 rounded-full bg-emerald-400"></span>
              </div>
              <div className="flex-1 mx-2 px-3 py-1 rounded-md bg-white dark:bg-cyber-bg text-xs mono truncate flex items-center gap-2">
                <span>🔒</span>{url}
              </div>
              <div className="relative">
                <span className="text-xl">🛡️</span>
                {result && !result.error && (
                  <span className={`absolute -top-1 -right-1 w-3 h-3 rounded-full border-2 border-white dark:border-slate-800
                    ${result.is_phishing ? "bg-red-500" : "bg-emerald-500"}`}></span>
                )}
              </div>
            </div>
            <div className="p-10 text-center text-slate-400 text-sm">
              <p className="text-3xl mb-2">🌐</p>
              Simulated webpage content for<br /><span className="mono">{url}</span>
            </div>
          </div>

          <div className="mt-4 flex gap-2">
            <input value={url} onChange={(e) => setUrl(e.target.value)}
              className="flex-1 px-3 py-2 rounded-lg border border-slate-200 dark:border-cyber-border bg-white dark:bg-cyber-panel text-sm mono outline-none" />
            <button onClick={handleScan} disabled={loading}
              className="px-4 py-2 rounded-lg bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-semibold text-sm">
              {loading ? "Scanning..." : "Visit"}
            </button>
          </div>
        </div>

        <div className="rounded-xl border border-slate-200 dark:border-cyber-border bg-white dark:bg-cyber-panel p-4">
          <h3 className="font-bold mb-3 flex items-center gap-2">🛡️ ShieldScan Popup</h3>
          {!result ? (
            <p className="text-sm text-slate-400">Click "Visit" to simulate the extension scanning this page.</p>
          ) : result.error ? (
            <p className="text-sm text-red-400">{result.error}</p>
          ) : (
            <div>
              <div className={`p-4 rounded-xl mb-3 text-center font-bold
                ${result.is_phishing ? "bg-red-500/10 text-red-400 border border-red-500/30" : "bg-emerald-500/10 text-emerald-400 border border-emerald-500/30"}`}>
                {result.is_phishing ? "⚠ Warning: Phishing Site Detected" : "✓ This site looks safe"}
              </div>
              <div className="flex items-center justify-around mb-4">
                <div className="text-center">
                  <p className="text-xs text-slate-400">Safety Score</p>
                  <p className="text-2xl font-extrabold mono">{result.safety_score}</p>
                </div>
                <div className="text-center">
                  <p className="text-xs text-slate-400">Confidence</p>
                  <p className="text-2xl font-extrabold mono">{result.confidence}%</p>
                </div>
                <div className="text-center">
                  <RiskBadge level={result.risk_level} />
                </div>
              </div>
              <p className="text-xs font-bold uppercase text-slate-400 mb-2">Why?</p>
              <ul className="space-y-1 text-sm">
                {result.reasons.map((r, i) => <li key={i} className="flex gap-2"><span>•</span>{r}</li>)}
              </ul>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ---------------------------------------------------------------------------
// App Root
// ---------------------------------------------------------------------------

function App() {
  const [page, setPage] = useState("home");
  const [dark, setDark] = useState(true);
  const [refreshKey, setRefreshKey] = useState(0);

  useEffect(() => {
    document.documentElement.classList.toggle("dark", dark);
  }, [dark]);

  return (
    <div className="min-h-screen">
      <Navbar page={page} setPage={setPage} dark={dark} setDark={setDark} />
      {page === "home" && <HomePage onScanned={() => setRefreshKey(k => k + 1)} />}
      {page === "history" && <HistoryPage />}
      {page === "dashboard" && <DashboardPage refreshKey={refreshKey} />}
      {page === "extension" && <ExtensionPage />}
      <footer className="text-center text-xs text-slate-400 py-8">
        ShieldScan — AI-Powered Phishing Website Detection · Random Forest + Flask + React
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
